name: auth-service
inspired_by: "Auth0 / Clerk (core auth layer)"
version_introduced: v0.4.1

ideation: |
  Build the authentication backbone for a SaaS product. Users need signup, login, token refresh, and logout. The system needs role-based access control with admin, editor, and viewer roles. Security is paramount — passwords must be hashed properly, tokens must expire, and the API must defend against common auth attacks. No OAuth, no MFA, no social login — just the core credential and session layer.

